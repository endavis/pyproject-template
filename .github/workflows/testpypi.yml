name: Publish to TestPyPI

on:
  workflow_dispatch:
  # PEP440 pre-release tag patterns. commitizen (used by doit release) emits
  # these forms, not semver-style v*-alpha.* tags. See #659.
  push:
    tags:
      - "v*a[0-9]*"       # alpha: v0.1.0a0
      - "v*b[0-9]*"       # beta: v0.1.0b1
      - "v*rc[0-9]*"      # rc: v0.1.0rc0
      - "v*.dev[0-9]*"    # dev: v0.1.0.dev2

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Run CI checks
    uses: ./.github/workflows/ci.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: pv
        uses: ./.github/actions/python-versions

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.pv.outputs.newest }}

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Show resolved version
        run: |
          uv run python - <<'PY'
          import package_name
          print(f"Resolved version: {package_name.__version__}")
          PY

      - name: Build artifacts
        run: uv build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          skip-existing: true
