name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
  workflow_call:
    inputs:
      full_matrix:
        description: 'Run the full Python-version matrix (middle versions) instead of the bookend versions.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      oldest: ${{ steps.pv.outputs.oldest }}
      newest: ${{ steps.pv.outputs.newest }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/python-versions.json
            .github/actions/python-versions
          sparse-checkout-cone-mode: false

      - id: pv
        uses: ./.github/actions/python-versions

      - name: Set matrix based on config and label
        id: set-matrix
        env:
          OLDEST: ${{ steps.pv.outputs.oldest }}
          NEWEST: ${{ steps.pv.outputs.newest }}
        run: |
          oldest="$OLDEST"
          newest="$NEWEST"

          oldest_minor=${oldest#3.}
          newest_minor=${newest#3.}

          if [[ "${{ inputs.full_matrix }}" == "true" ]]; then
            # Middle versions only (bookends already tested)
            versions=""
            for ((i=oldest_minor+1; i<newest_minor; i++)); do
              if [[ -n "$versions" ]]; then
                versions="$versions,"
              fi
              versions="$versions\"3.$i\""
            done

            if [[ -z "$versions" ]]; then
              echo "No middle versions to test (oldest=$oldest, newest=$newest)"
              echo 'matrix={"include":[]}' >> $GITHUB_OUTPUT
            else
              echo "Middle versions: $versions"
              echo "matrix={\"os\":[\"ubuntu-latest\",\"windows-latest\",\"macos-latest\"],\"python-version\":[$versions]}" >> $GITHUB_OUTPUT
            fi
          else
            # Bookend versions (oldest + newest)
            echo "Bookend versions: $oldest, $newest"
            echo "matrix={\"os\":[\"ubuntu-latest\",\"windows-latest\",\"macos-latest\"],\"python-version\":[\"$oldest\",\"$newest\"]}" >> $GITHUB_OUTPUT
          fi

  test:
    needs: setup
    if: ${{ needs.setup.outputs.matrix != '{"include":[]}' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    env:
      UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache
      HYPOTHESIS_PROFILE: ci

    steps:
      - name: Configure git line endings (Windows)
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v6
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests with coverage
        if: matrix.python-version == needs.setup.outputs.newest && matrix.os == 'ubuntu-latest'
        run: uv run pytest -n auto --cov=package_name --cov-report=xml:tmp/coverage.xml --cov-report=term -v --ignore=tests/benchmarks/

      - name: Run tests
        if: "!(matrix.python-version == needs.setup.outputs.newest && matrix.os == 'ubuntu-latest')"
        run: uv run pytest -n auto -v --ignore=tests/benchmarks/

      - name: Upload coverage to Codecov
        if: matrix.python-version == needs.setup.outputs.newest && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v7
        with:
          files: ./tmp/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  docs:
    needs: setup
    if: ${{ needs.setup.outputs.matrix != '{"include":[]}' }}
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ needs.setup.outputs.newest }}

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v6
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Build documentation
        run: uv run doit docs_build

  lint:
    needs: setup
    if: ${{ needs.setup.outputs.matrix != '{"include":[]}' }}
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ needs.setup.outputs.newest }}

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v6
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Check code formatting
        run: uv run doit format_check

      - name: Run linting
        run: uv run doit lint

      - name: Run type checking
        run: uv run doit type_check

      - name: Run security scan
        run: uv run doit security

      - name: Run spell check
        run: uv run doit spell_check

      - name: Run dependency audit
        run: uv run doit audit

  ci-complete:
    if: always()
    needs: [setup, test, lint, docs]
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status
        run: |
          setup_result="${{ needs.setup.result }}"
          test_result="${{ needs.test.result }}"
          lint_result="${{ needs.lint.result }}"
          docs_result="${{ needs.docs.result }}"

          echo "Setup result: $setup_result"
          echo "Test result: $test_result"
          echo "Lint result: $lint_result"
          echo "Docs result: $docs_result"

          # Setup must succeed
          if [[ "$setup_result" != "success" ]]; then
            echo "Setup job failed"
            exit 1
          fi

          # Test must succeed or be skipped (skipped = no middle versions)
          if [[ "$test_result" != "success" && "$test_result" != "skipped" ]]; then
            echo "Test job failed"
            exit 1
          fi

          # Lint must succeed or be skipped (skipped = no middle versions)
          if [[ "$lint_result" != "success" && "$lint_result" != "skipped" ]]; then
            echo "Lint job failed"
            exit 1
          fi

          # Docs must succeed or be skipped (skipped = no middle versions)
          if [[ "$docs_result" != "success" && "$docs_result" != "skipped" ]]; then
            echo "Docs job failed"
            exit 1
          fi

          echo "CI completed successfully"
