description = "Delegate implementation of GitHub issue {{args}} to GitHub Copilot CLI."
prompt = """
## Instructions

Use the `run_shell_command` tool to invoke Copilot non-interactively. Copilot requires `--allow-all` for non-interactive mode. Hybrid C: prefer the existing `/ghissue-implement` command if available, otherwise inline workflow.

```bash
copilot --allow-all -p 'Implement GitHub issue #{{args}} in the current repository. If the /ghissue-implement command is available, run it for this issue. Otherwise, follow this workflow: 1) Read the plan comment from issue #{{args}} via `gh issue view {{args}} --json comments`. 2) Read AGENTS.md for branch naming and commit conventions. 3) Create or check out the branch `<type>/{{args}}-<slug>` (do not commit to main). 4) Implement the changes per the plan. 5) Run `doit check` to validate. Do NOT push the branch or open a PR — the user reviews first.'
```

After Copilot returns:
- Summarize what was implemented and the `doit check` result.
- Show the user the changed files (`git status`, `git diff --stat`) so they can review.
- Do not push or open a PR yourself.
"""
