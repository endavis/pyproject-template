description = "Delegate a read-only code review of current changes to Antigravity CLI (agy). Optional focus: {{args}}"
prompt = """
## Instructions

Use the `run_shell_command` tool to invoke Antigravity non-interactively. The prompt asks `agy` to use its Antigravity review skill if available, otherwise the inline workflow. `agy` needs `--add-dir` pointed at the repo root so it loads the workspace (and the shared dangerous-command hook); `--dangerously-skip-permissions` auto-approves routine tools while that hook still hard-blocks unsafe ones.

```bash
agy -p 'Review the current uncommitted changes and the current branch vs main, read-only. If an Antigravity review skill (antigravity-review) is available, use it. Otherwise: 1) Run `git status` and `git diff`. 2) Run `git log main..HEAD --oneline` for branch context. 3) Read AGENTS.md and any relevant ADRs in docs/decisions/. 4) Identify correctness issues, risks, missing tests, style/convention violations, and concrete suggestions. 5) Print findings to stdout in a structured format (Summary / Issues / Suggestions). Do NOT modify any files. Focus area (optional): {{args}}' --dangerously-skip-permissions --add-dir "$(git rev-parse --show-toplevel)"
```

After Antigravity returns:
- Summarize the review findings, highlighting blocking issues vs nits.
- Do not auto-apply suggestions — the user decides what to act on.
"""
