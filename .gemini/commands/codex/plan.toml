description = "Delegate planning for GitHub issue {{args}} to Codex CLI."
prompt = """
## Instructions

Use the `run_shell_command` tool to invoke Codex non-interactively. Hybrid C: prefer the existing `$ghissue-plan` skill if available, otherwise inline workflow. Single-quote the prompt so the literal `$ghissue-plan` reaches Codex (not the shell).

```bash
codex -a never exec 'Plan the implementation for GitHub issue #{{args}} in the current repository. If the $ghissue-plan skill is available, activate it for this issue. Otherwise, follow this workflow: 1) Run `gh issue view {{args}} --json title,body,labels` to read the issue. 2) Read AGENTS.md to understand the workflow and conventions. 3) Explore the relevant files. 4) Draft a plan with three sections: Implementation Plan, Test Plan, Validation Plan. 5) Print the full plan to stdout. Do NOT post a comment to the issue — the user reviews and posts.'
```

After Codex returns:
- Summarize the plan to the user.
- If the user wants revisions, invoke Codex again with their feedback appended to the prompt.
- Do not post the plan as a comment yourself — the user owns that step.
"""
